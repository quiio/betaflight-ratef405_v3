name: Build RATEF405_v3

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/gwlim/betaflight.git
  REPO_BRANCH: master
  BUILDROOT: ${{ github.workspace }}/betaflight
  TZ: UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get -qq update && sudo apt-get -qq upgrade
        sudo apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget
        sudo apt-get -qq autoremove --purge
        sudo apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
    - name: Maximize build disk space
      uses: easimon/maximize-build-space@master
      with:
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true
        remove-docker-images: true

    - name: Checkout
      uses: actions/checkout@main

    - name: Download the sources
      run: git clone --branch $REPO_BRANCH $REPO_URL

    - name: Build firmware
      run: |
        cd $BUILDROOT && \
        make arm_sdk_install && \
        make configs && \
        git submodule update --remote --merge && \
        make RATEF405_V3 EXTRA_FLAGS="-DUSE_MAG" && \
        echo "BUILD_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
    - name: Upload firmware to Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: "build-${{ github.sha }}"
        name: "Build ${{ env.BUILD_DATE }}"
        files: |
          ./betaflight/obj/*.hex
